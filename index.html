<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Stok BTI - Cloud</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f8fafc;
            --dark: #1e293b;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .tabs { display: flex; background: var(--dark); padding: 5px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; cursor: pointer; font-size: 15px; font-weight: 600; border-radius: 10px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .content { padding: 30px; display: none; }
        .content.active { display: block; }

        .grid-forms { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: bold; color: #64748b; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; font-size: 14px; }
        
        .search-box { 
            width: 100%; padding: 12px 15px; margin-bottom: 15px; 
            border: 2px solid var(--primary); border-radius: 8px; outline: none;
        }

        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-in { background: var(--success); color: white; }
        .btn-out { background: var(--danger); color: white; }
        .btn-export { background: #64748b; color: white; width: auto; padding: 10px 20px; }
        
        .toast { display: none; margin-top: 10px; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 13px; }
        .toast-success { background: #dcfce7; color: #166534; }
        .toast-error { background: #fee2e2; color: #991b1b; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { padding: 15px; border-radius: 10px; color: white; text-align: center; }
        .bg-blue { background: #4a90e2; }
        .bg-green { background: #27ae60; }
        .bg-red { background: #e74c3c; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; font-size: 13px; }
        th { background: #f1f5f9; text-transform: uppercase; color: #64748b; font-size: 11px; }
        .badge-loc { background: #e0f2fe; padding: 2px 8px; border-radius: 4px; font-size: 11px; color: #0369a1; font-weight: bold; }
        .history-in { color: var(--success); font-weight: bold; }
        .history-out { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'input-tab')">📥 Manajemen Stok</button>
        <button class="tab-btn" onclick="openTab(event, 'dashboard-tab')">📊 Dashboard & Laporan</button>
    </div>

    <div id="input-tab" class="content active">
        <div class="grid-forms">
            <div class="card">
                <h3 style="color: var(--success); margin-top:0;">+ Stok Masuk</h3>
                <label>Barcode</label>
                <input type="text" id="inNama" list="listNama" placeholder="Manufacture barcode...">
                <label>Lokasi Penyimpanan</label>
                <input type="text" id="inLokasi" list="listLokasi" placeholder="Ketik lokasi...">
                <label>Jumlah</label>
                <input type="number" id="inQty" placeholder="0">
                <button class="btn-in" onclick="proses(true)">Input</button>
                <div id="msg-in" class="toast"></div>
            </div>

            <div class="card">
                <h3 style="color: var(--danger); margin-top:0;">- Stok Keluar</h3>
                <label>Barcode</label>
                <input type="text" id="outNama" list="listNama" placeholder="Manufacture barcode...">
                <label>Lokasi Pengambilan</label>
                <input type="text" id="outLokasi" list="listLokasi" placeholder="Ketik lokasi asal...">
                <label>Jumlah</label>
                <input type="number" id="outQty" placeholder="0">
                <button class="btn-out" onclick="proses(false)">Output</button>
                <div id="msg-out" class="toast"></div>
            </div>
        </div>

        <datalist id="listNama"></datalist>
        <datalist id="listLokasi"></datalist>

        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button onclick="exportCSV()" class="btn-export">📥 Download CSV</button>
            <button onclick="hapusData()" style="background: #cbd5e1; color: #475569; width: auto; padding: 10px 20px;">Reset Database</button>
        </div>
    </div>

    <div id="dashboard-tab" class="content">
        <div class="stats-grid">
            <div class="stat-card bg-blue"><small>Jenis/Posisi</small><p id="countJenis">0</p></div>
            <div class="stat-card bg-green"><small>Total Unit</small><p id="countTotal">0</p></div>
            <div class="stat-card bg-red"><small>Riwayat</small><p id="countLog">0</p></div>
        </div>
        <h3>📦 Stok Aktif</h3>
        <input type="text" id="searchBarang" class="search-box" placeholder="🔍 Cari Manufacture barcode atau lokasi..." onkeyup="filterTabel()">
        <table id="tabelStok">
            <thead><tr><th>Manufacture barcode</th><th>Lokasi</th><th>Jumlah</th></tr></thead>
            <tbody></tbody>
        </table>
        <h3 style="margin-top:30px;">🕒 Riwayat Aktivitas</h3>
        <table id="tabelLog">
            <thead><tr><th>Waktu (MM/DD/YYYY)</th><th>Barang</th><th>Lokasi</th><th>Tipe</th><th>Qty</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://bti-stock-default-rtdb.asia-southeast1.firebasedatabase.app/.json";

    let dbStok = {}; 
    let dbLog = [];

    async function loadFromCloud() {
        try {
            const res = await fetch(FIREBASE_URL);
            const data = await res.json();
            if (data) {
                dbStok = data.stok || {};
                dbLog = data.log || [];
                updateUI();
            }
        } catch (e) { console.error(e); }
    }

    async function saveToCloud() {
        await fetch(FIREBASE_URL, {
            method: 'PUT',
            body: JSON.stringify({ stok: dbStok, log: dbLog })
        });
    }

    function showToast(id, message, isError = false) {
        const el = document.getElementById(id);
        el.innerText = message;
        el.className = `toast ${isError ? 'toast-error' : 'toast-success'}`;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
        loadFromCloud();
    }

    async function proses(isMasuk) {
        const pfx = isMasuk ? 'in' : 'out';
        const msgId = isMasuk ? 'msg-in' : 'msg-out';
        
        const nama = document.getElementById(pfx + 'Nama').value.trim();
        const lokasi = document.getElementById(pfx + 'Lokasi').value.trim();
        const qty = parseInt(document.getElementById(pfx + 'Qty').value);
        
        if (!nama || !lokasi || isNaN(qty) || qty <= 0) {
            showToast(msgId, "Harap isi Nama, Lokasi, dan Jumlah!", true);
            return;
        }

        const d = new Date();
        const f = (v) => v.toString().padStart(2, '0');
        const waktu = `${f(d.getMonth()+1)}/${f(d.getDate())}/${d.getFullYear()} ${f(d.getHours())}:${f(d.getMinutes())}`;
        const key = `${nama}@${lokasi}`;

        if (isMasuk) {
            if (!dbStok[key]) dbStok[key] = { nama, lokasi, qty: 0 };
            dbStok[key].qty += qty;
            dbLog.unshift({ waktu, nama, lokasi, tipe: 'in', qty: '+' + qty, cls: 'history-in' });
            showToast(msgId, "Stok Masuk Berhasil!");
        } else {
            if (!dbStok[key] || dbStok[key].qty < qty) {
                showToast(msgId, "Gagal! Stok di lokasi tersebut tidak ditemukan atau tidak cukup.", true);
                return;
            }
            dbStok[key].qty -= qty;
            dbLog.unshift({ waktu, nama, lokasi, tipe: 'out', qty: '-' + qty, cls: 'history-out' });
            showToast(msgId, "Stok Keluar Berhasil!");
        }

        await saveToCloud();
        document.querySelectorAll(`#input-tab input`).forEach(i => i.value = '');
        updateUI();
    }

    function updateUI() {
        const tStok = document.querySelector('#tabelStok tbody');
        const tLog = document.querySelector('#tabelLog tbody');
        const listNama = document.getElementById('listNama');
        const listLokasi = document.getElementById('listLokasi');
        
        tStok.innerHTML = ''; tLog.innerHTML = ''; 
        listNama.innerHTML = ''; listLokasi.innerHTML = '';

        let total = 0, jenisPosisi = 0;
        let setNama = new Set(), setLok = new Set();

        const sortedKeys = Object.keys(dbStok).sort();
        sortedKeys.forEach(key => {
            if (dbStok[key].qty > 0) {
                const item = dbStok[key];
                jenisPosisi++; total += item.qty;
                tStok.innerHTML += `<tr><td><strong>${item.nama}</strong></td><td><span class="badge-loc">${item.lokasi}</span></td><td>${item.qty} pcs</td></tr>`;
                setNama.add(item.nama);
                setLok.add(item.lokasi);
            }
        });

        dbLog.slice(0, 30).forEach(l => {
            tLog.innerHTML += `<tr><td>${l.waktu}</td><td>${l.nama}</td><td><small>${l.lokasi}</small></td><td>${l.tipe}</td><td class="${l.cls}">${l.qty}</td></tr>`;
        });

        setNama.forEach(n => listNama.innerHTML += `<option value="${n}">`);
        setLok.forEach(l => listLokasi.innerHTML += `<option value="${l}">`);
        
        document.getElementById('countJenis').innerText = jenisPosisi;
        document.getElementById('countTotal').innerText = total;
        document.getElementById('countLog').innerText = dbLog.length;
    }

    function filterTabel() {
        const input = document.getElementById('searchBarang').value.toLowerCase();
        const rows = document.querySelector('#tabelStok tbody').getElementsByTagName('tr');
        for (let i = 0; i < rows.length; i++) {
            rows[i].style.display = rows[i].innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }

    function exportCSV() {
        let csv = "Waktu,Barang,Lokasi,Tipe,Jumlah\n";
        dbLog.forEach(l => { csv += `${l.waktu},${l.nama},${l.lokasi},${l.tipe},${l.qty}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download = 'laporan_stok.csv'; a.click();
    }

    async function hapusData() {
        if(confirm("Hapus semua data?")) { dbStok = {}; dbLog = []; await saveToCloud(); updateUI(); }
    }

    loadFromCloud();
</script>
</body>
</html>
